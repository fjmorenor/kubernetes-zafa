name: 'Terraform GKE Deploy'

on:
  push:
    branches: [ "main" ]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./environments/dev

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/932038588586/locations/global/workloadIdentityPools/github-pool-zafa/providers/github-provider'
        service_account: 'github-actions-deployer@landing-dev-zafa.iam.gserviceaccount.com'

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3

    - name: 'Terraform Init'
      run: terraform init

    - name: 'Terraform Plan'
      run: terraform plan -input=false

    - name: 'Terraform Apply'
      run: terraform apply -auto-approve -input=false