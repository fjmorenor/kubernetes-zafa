apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-nginx-prod
  labels:
    app: nginx-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
      - name: nginx
        image: europe-west1-docker.pkg.dev/landing-dev-zafa/mi-repo/nginx-web:v1
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 1
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-publico
spec:
  type: LoadBalancer
  selector:
    app: nginx-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

      env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true